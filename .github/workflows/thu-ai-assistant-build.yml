name: thu-ai-assistant Build & Push

# master 推送或合并后，构建并推送 Docker 镜像到外部镜像仓库
on:
  push:
    branches:
      - master
      - main
    paths:
      - "apps/thu-ai-assistant/**"
      - "packages/**"
      - "package.json"
      - "yarn.lock"
      - "lerna.json"
      - ".github/workflows/thu-ai-assistant-build.yml"
      - ".github/workflows/thu-ai-assistant-release.yml"

# 同一分支上多次 push 时串行执行，避免镜像 tag 竞争
concurrency:
  group: thu-ai-assistant-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  docker-image:
    name: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_NAME: thu-ai-assistant
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 构建前先确认三项 Secret 都已配置，否则 fail-fast 给出可操作的提示
      - name: Validate registry secrets
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          missing=()
          [ -z "$REGISTRY_URL" ]      && missing+=("REGISTRY_URL")
          [ -z "$REGISTRY_USERNAME" ] && missing+=("REGISTRY_USERNAME")
          [ -z "$REGISTRY_TOKEN" ]    && missing+=("REGISTRY_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}. 请在 Settings → Secrets and variables → Actions 补齐。"
            exit 1
          fi

      - name: Compute short SHA
        id: meta
        run: echo "sha7=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/thu-ai-assistant/Dockerfile
          push: true
          # 以仓库根为 context，Docker 会优先读 apps/thu-ai-assistant/Dockerfile.dockerignore
          tags: |
            ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha7 }}
            ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=thu-ai-assistant
          cache-to: type=gha,scope=thu-ai-assistant,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "### thu-ai-assistant image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha7 }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
