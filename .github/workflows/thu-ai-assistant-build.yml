name: thu-ai-assistant Build & Push

# master 推送或合并后，构建并推送 Docker 镜像到 GitHub Container Registry (ghcr.io)
on:
  push:
    branches:
      - master
      - main
    paths:
      - "apps/thu-ai-assistant/**"
      - "packages/**"
      - "package.json"
      - "yarn.lock"
      - "lerna.json"
      - ".github/workflows/thu-ai-assistant-build.yml"
      - ".github/workflows/thu-ai-assistant-release.yml"

# 同一分支上多次 push 时串行执行，避免镜像 tag 竞争
concurrency:
  group: thu-ai-assistant-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write  # 推送镜像到 ghcr.io 需要

jobs:
  docker-image:
    name: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REGISTRY: ghcr.io
      # 镜像名统一小写：ghcr.io/<owner>/thu-ai-assistant
      IMAGE_NAME: ${{ github.repository_owner }}/thu-ai-assistant
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name (lowercase)
        id: img
        run: |
          # ghcr.io 要求镜像路径全小写；若仓库 owner 含大写字母需转小写
          lower=$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "name=${lower}" >> "$GITHUB_OUTPUT"
          echo "sha7=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/thu-ai-assistant/Dockerfile
          push: true
          # 以仓库根为 context，Docker 会优先读 apps/thu-ai-assistant/Dockerfile.dockerignore
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ steps.img.outputs.sha7 }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
          cache-from: type=gha,scope=thu-ai-assistant
          cache-to: type=gha,scope=thu-ai-assistant,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "### thu-ai-assistant image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ steps.img.outputs.sha7 }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
