name: thu-ai-assistant Release

# 当推送形如 `thu-ai-assistant-v1.2.3` 的 Git Tag 时：
# 1) 构建并推送带版本号的 Docker 镜像
# 2) 基于该 Tag 创建 GitHub Release（附自动生成的 release notes + docker pull 提示）
on:
  push:
    tags:
      - "thu-ai-assistant-v*"

concurrency:
  group: thu-ai-assistant-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # 创建 GitHub Release 需要写权限

jobs:
  build-and-push:
    name: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_NAME: thu-ai-assistant
    outputs:
      version: ${{ steps.meta.outputs.version }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate registry secrets
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          missing=()
          [ -z "$REGISTRY_URL" ]      && missing+=("REGISTRY_URL")
          [ -z "$REGISTRY_USERNAME" ] && missing+=("REGISTRY_USERNAME")
          [ -z "$REGISTRY_TOKEN" ]    && missing+=("REGISTRY_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}."
            exit 1
          fi

      - name: Extract version from tag
        id: meta
        run: |
          # GITHUB_REF_NAME 例：thu-ai-assistant-v1.2.3 → version=1.2.3
          version="${GITHUB_REF_NAME#thu-ai-assistant-v}"
          sha7="${GITHUB_SHA::7}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha7=${sha7}"       >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ secrets.REGISTRY_URL }}/thu-ai-assistant:${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build & push versioned image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/thu-ai-assistant/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha7 }}
            ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=thu-ai-assistant
          cache-to: type=gha,scope=thu-ai-assistant,mode=max
          provenance: false

  release:
    name: github-release
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gh-release 自动生成 changelog 需要完整历史

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: thu-ai-assistant ${{ needs.build-and-push.outputs.version }}
          generate_release_notes: true
          body: |
            ## 🚀 thu-ai-assistant v${{ needs.build-and-push.outputs.version }}

            Docker 镜像已发布：

            ```bash
            docker pull ${{ needs.build-and-push.outputs.image_ref }}
            docker run -d -p 3000:3000 --env-file .env ${{ needs.build-and-push.outputs.image_ref }}
            ```

            详见 [`apps/thu-ai-assistant/DOCKER.md`](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/apps/thu-ai-assistant/DOCKER.md)。
