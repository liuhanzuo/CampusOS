<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Agent</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script>
        if (typeof QRCode === "undefined") {
            document.write('<script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"><\/script>');
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════
           DESIGN TOKENS
           ═══════════════════════════════════════════ */
        :root {
            /* sidebar (dark) */
            --sb-bg: #111111;
            --sb-surface: #1a1a1a;
            --sb-surface-hover: #222222;
            --sb-border: #2a2a2a;
            --sb-text: #e5e5e5;
            --sb-muted: #888888;

            /* main (light) */
            --bg: #ffffff;
            --bg-chat: #fafafa;
            --surface: #ffffff;
            --ink: #111111;
            --ink-secondary: #555555;
            --border: #e5e5e5;
            --border-light: #f0f0f0;

            /* accent */
            --accent: #0d9488;
            --accent-hover: #0a7a70;
            --accent-soft: rgba(13, 148, 136, 0.08);
            --accent-glow: rgba(13, 148, 136, 0.2);

            /* semantic */
            --blue: #3b82f6;
            --blue-soft: #eff6ff;
            --green: #10b981;
            --green-soft: #ecfdf5;
            --amber: #f59e0b;
            --amber-soft: #fffbeb;
            --red: #ef4444;
            --red-soft: #fef2f2;

            /* layout */
            --sb-width: 320px;
            --header-h: 56px;
            --radius: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
            --transition: 0.15s ease;
        }

        /* ═══════════════════════════════════════════
           RESET
           ═══════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--ink);
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        button, input, textarea { font: inherit; color: inherit; }
        button { cursor: pointer; border: none; background: none; }
        button:disabled { cursor: not-allowed; opacity: 0.4; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ═══════════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════════ */
        .app {
            height: 100vh;
            display: grid;
            grid-template-columns: var(--sb-width) 1fr;
        }

        /* ═══════════════════════════════════════════
           SIDEBAR
           ═══════════════════════════════════════════ */
        .sidebar {
            background: var(--sb-bg);
            color: var(--sb-text);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sb-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--sb-border);
        }

        .sb-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .sb-logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #065f46);
            display: grid;
            place-items: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .sb-logo-text {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .sb-logo-text small {
            display: block;
            font-size: 11px;
            font-weight: 400;
            color: var(--sb-muted);
            letter-spacing: 0;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 100px;
            background: var(--sb-surface);
            border: 1px solid var(--sb-border);
            font-size: 11px;
            font-weight: 600;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--sb-muted);
        }

        .status-success .dot { background: var(--green); box-shadow: 0 0 6px rgba(16, 185, 129, 0.4); }
        .status-pending .dot { background: var(--blue); animation: pulse 1.5s infinite; }
        .status-two_factor .dot { background: var(--amber); }
        .status-error .dot { background: var(--red); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .sb-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }

        .sb-body::-webkit-scrollbar { width: 4px; }
        .sb-body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        /* panels */
        .sb-section {
            margin-bottom: 20px;
        }

        .sb-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--sb-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
        }

        /* form fields */
        .field-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }

        .sb-input {
            width: 100%;
            height: 36px;
            padding: 0 12px;
            border-radius: 8px;
            border: 1px solid var(--sb-border);
            background: var(--sb-surface);
            color: var(--sb-text);
            font-size: 13px;
            outline: none;
            transition: border-color var(--transition);
        }

        .sb-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .sb-input::placeholder { color: #555; }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--sb-muted);
            cursor: pointer;
        }

        .remember-row input[type="checkbox"] {
            accent-color: var(--accent);
        }

        /* buttons */
        .btn-primary {
            height: 36px;
            padding: 0 16px;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-size: 13px;
            font-weight: 600;
            transition: all var(--transition);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .btn-secondary {
            height: 36px;
            padding: 0 16px;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 13px;
            font-weight: 600;
            transition: all var(--transition);
        }

        .btn-secondary:hover:not(:disabled) {
            background: #1d4ed8;
        }

        .btn-ghost {
            height: 36px;
            padding: 0 14px;
            border-radius: 8px;
            background: var(--sb-surface);
            border: 1px solid var(--sb-border);
            color: var(--sb-text);
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition);
        }

        .btn-ghost:hover:not(:disabled) {
            background: var(--sb-surface-hover);
            border-color: #444;
        }

        /* light-theme ghost (for main area) */
        .btn-ghost-light {
            height: 34px;
            padding: 0 12px;
            border-radius: 8px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--ink-secondary);
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition);
        }

        .btn-ghost-light:hover:not(:disabled) {
            background: #f5f5f5;
            border-color: #ccc;
        }

        .twofa-methods {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .twofa-code-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }

        /* capability cards */
        .cap-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .cap-card {
            padding: 12px;
            border-radius: var(--radius);
            border: 1px solid var(--sb-border);
            background: var(--sb-surface);
            text-align: left;
            font-size: 13px;
            font-weight: 500;
            color: var(--sb-text);
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cap-card:hover {
            background: var(--sb-surface-hover);
            border-color: #444;
        }

        .cap-card::before {
            font-size: 20px;
            line-height: 1;
        }

        .cap-card:nth-child(1)::before { content: "📅"; }
        .cap-card:nth-child(2)::before { content: "💳"; }
        .cap-card:nth-child(3)::before { content: "📚"; }
        .cap-card:nth-child(4)::before { content: "🏸"; }

        /* quick chips */
        .quick-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            height: 30px;
            padding: 0 12px;
            border-radius: 100px;
            border: 1px solid var(--sb-border);
            background: var(--sb-surface);
            color: var(--sb-muted);
            font-size: 12px;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .chip:hover {
            color: white;
            background: var(--accent);
            border-color: var(--accent);
        }

        /* ═══════════════════════════════════════════
           MAIN AREA
           ═══════════════════════════════════════════ */
        .main {
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: 0;
            background: var(--bg);
        }

        .main-header {
            height: var(--header-h);
            padding: 0 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .main-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .main-title {
            font-size: 15px;
            font-weight: 600;
        }

        .health-line {
            font-size: 12px;
            color: var(--ink-secondary);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        /* ═══════════════════════════════════════════
           MESSAGES
           ═══════════════════════════════════════════ */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            scrollbar-width: thin;
            scrollbar-color: #ddd transparent;
        }

        .messages::-webkit-scrollbar { width: 5px; }
        .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 5px; }

        .message {
            padding: 0 24px;
            margin-bottom: 4px;
            animation: msgIn 0.25s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-inner {
            max-width: 800px;
            margin: 0 auto;
        }

        /* user message */
        .message.user .message-inner {
            display: flex;
            justify-content: flex-end;
        }

        .user-bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: var(--radius-xl) 6px var(--radius-xl) var(--radius-xl);
            background: var(--ink);
            color: white;
            font-size: 14px;
            line-height: 1.6;
        }

        /* system event */
        .system-event {
            max-width: 800px;
            margin: 8px auto;
            padding: 6px 14px;
            border-radius: 100px;
            background: var(--bg-chat);
            border: 1px solid var(--border-light);
            color: var(--ink-secondary);
            font-size: 12px;
            text-align: center;
        }

        /* assistant message */
        .message.assistant .message-inner {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .avatar {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 14px;
            margin-top: 2px;
        }

        .avatar-ai {
            background: linear-gradient(135deg, var(--accent), #065f46);
            color: white;
            font-size: 10px;
            font-weight: 700;
        }

        .assistant-card {
            flex: 1;
            min-width: 0;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: white;
        }

        .assistant-body {
            padding: 16px 18px;
        }

        /* markdown inside assistant */
        .assistant-card h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--ink);
        }

        .assistant-card h3 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--ink);
        }

        .assistant-card p {
            margin-bottom: 8px;
            line-height: 1.7;
            color: #333;
        }

        .assistant-card strong { font-weight: 700; color: var(--ink); }

        .assistant-card code {
            padding: 2px 6px;
            border-radius: 4px;
            background: #f5f5f5;
            color: #c7254e;
            font-size: 12.5px;
            font-family: "SF Mono", "Fira Code", monospace;
        }

        .assistant-card pre {
            margin: 8px 0;
            padding: 14px 16px;
            border-radius: var(--radius);
            background: #1e1e1e;
            color: #d4d4d4;
            font-size: 12px;
            line-height: 1.6;
            overflow-x: auto;
            font-family: "SF Mono", "Fira Code", monospace;
        }

        .assistant-card pre code {
            padding: 0;
            background: transparent;
            color: inherit;
        }

        .assistant-card blockquote {
            margin: 8px 0;
            padding: 8px 14px;
            border-left: 3px solid var(--accent);
            background: var(--accent-soft);
            border-radius: 0 var(--radius) var(--radius) 0;
            color: #333;
        }

        .assistant-card ul, .assistant-card ol {
            margin: 6px 0;
            padding-left: 20px;
        }

        .assistant-card li {
            margin-bottom: 4px;
            line-height: 1.6;
            color: #333;
        }

        .assistant-card table {
            width: 100%;
            border-collapse: collapse;
            margin: 8px 0;
            font-size: 13px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .assistant-card th {
            background: #f9f9f9;
            font-weight: 600;
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        .assistant-card td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .assistant-card tr:last-child td { border-bottom: none; }

        /* kv grid */
        .kv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            margin: 8px 0;
        }

        .kv-item {
            padding: 10px 12px;
            border-radius: var(--radius);
            background: var(--bg-chat);
            border: 1px solid var(--border-light);
        }

        .kv-key {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--ink-secondary);
            margin-bottom: 2px;
        }

        .kv-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink);
            word-break: break-word;
        }

        /* tool results */
        .tool-results {
            border-top: 1px solid var(--border-light);
            padding: 12px 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tool-result {
            padding: 10px 12px;
            border-radius: var(--radius);
            background: var(--bg-chat);
            border: 1px solid var(--border-light);
        }

        .tool-result-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
        }

        .tool-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--ink);
            font-family: "SF Mono", "Fira Code", monospace;
            word-break: break-word;
        }

        .tool-status {
            flex-shrink: 0;
            padding: 2px 8px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            background: var(--green-soft);
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .tool-status.failed {
            background: var(--red-soft);
            color: var(--red);
            border-color: #fecaca;
        }

        .tool-fields {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 4px;
        }

        .tool-field {
            padding: 4px 0;
        }

        .tool-field-key {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--ink-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .tool-field-value {
            font-size: 13px;
            color: var(--ink);
        }

        /* action row */
        .action-row {
            padding: 12px 18px;
            border-top: 1px solid var(--border-light);
            background: var(--bg-chat);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .action-card {
            flex: 1;
            min-width: 200px;
            padding: 14px;
            border-radius: var(--radius);
            background: white;
            border: 1px solid var(--border);
        }

        .action-card strong {
            display: block;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .action-card p {
            font-size: 12px;
            color: var(--ink-secondary);
            margin-bottom: 10px;
        }

        .action-card .btn-primary,
        .action-card .btn-secondary {
            width: 100%;
        }

        /* typing indicator */
        .typing {
            display: inline-flex;
            gap: 4px;
            padding: 14px 18px;
        }

        .typing span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #999;
            animation: typingBounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.15s; }
        .typing span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingBounce {
            0%, 70%, 100% { transform: translateY(0); opacity: 0.3; }
            35% { transform: translateY(-6px); opacity: 1; }
        }

        /* ═══════════════════════════════════════════
           COMPOSER
           ═══════════════════════════════════════════ */
        .composer {
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border-light);
            background: white;
        }

        .composer-inner {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .composer-input {
            flex: 1;
            min-height: 44px;
            max-height: 140px;
            padding: 11px 16px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: var(--bg-chat);
            color: var(--ink);
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .composer-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: white;
        }

        .composer-input::placeholder { color: #aaa; }

        .send-btn {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--ink);
            color: white;
            display: grid;
            place-items: center;
            transition: all var(--transition);
        }

        .send-btn:hover:not(:disabled) {
            background: #333;
            transform: scale(1.05);
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ═══════════════════════════════════════════
           MODALS
           ═══════════════════════════════════════════ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal {
            width: min(460px, 94vw);
            max-height: 92vh;
            overflow: auto;
            border-radius: var(--radius-lg);
            background: white;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.2);
            padding: 24px;
        }

        .modal.large { width: min(1120px, 96vw); }

        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .modal-head h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .qr-box {
            display: flex;
            justify-content: center;
            padding: 16px 0;
        }

        .url-box {
            margin-top: 12px;
            padding: 10px;
            border-radius: var(--radius);
            background: var(--bg-chat);
            font-size: 12px;
            word-break: break-all;
            color: var(--ink-secondary);
            font-family: "SF Mono", monospace;
        }

        .captcha-stage {
            min-height: 200px;
            background: #111;
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .captcha-stage img {
            max-width: 100%;
            display: block;
            touch-action: none;
        }

        /* ═══════════════════════════════════════════
           TOAST
           ═══════════════════════════════════════════ */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            z-index: 1200;
            display: none;
            padding: 10px 20px;
            border-radius: 100px;
            background: var(--ink);
            color: white;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: toastIn 0.25s ease;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(8px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ═══════════════════════════════════════════
           RENDER EMPTY
           ═══════════════════════════════════════════ */
        .render-empty {
            color: var(--ink-secondary);
            font-style: italic;
        }

        /* ═══════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════ */
        @media (max-width: 768px) {
            body { overflow: auto; }

            .app {
                height: auto;
                min-height: 100vh;
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-bottom: 1px solid var(--sb-border);
            }

            .main {
                height: 70vh;
                min-height: 500px;
            }

            .message { padding: 0 16px; }
            .composer { padding: 12px 16px 16px; }
            .composer-inner { gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ═══ SIDEBAR ═══ -->
        <aside class="sidebar">
            <div class="sb-header">
                <div class="sb-logo">
                    <div class="sb-logo-icon">🎓</div>
                    <div class="sb-logo-text">
                        Campus Agent
                        <small>CampusOS · AI 助手</small>
                    </div>
                </div>
                <div class="status-pill status-unknown" id="status-pill">
                    <span class="dot"></span>
                    <span id="status-label">未检查</span>
                </div>
            </div>

            <div class="sb-body">
                <!-- login -->
                <div class="sb-section">
                    <div class="sb-section-title">连接</div>
                    <div class="field-stack">
                        <div class="field-row">
                            <input class="sb-input" id="backend-url" value="" aria-label="后端地址" placeholder="后端地址">
                            <button class="btn-secondary" id="health-btn">检查</button>
                        </div>
                        <input class="sb-input" id="user-id" placeholder="学号" autocomplete="username">
                        <input class="sb-input" id="password" placeholder="密码" type="password" autocomplete="current-password">
                        <label class="remember-row">
                            <input id="remember-user-id" type="checkbox" checked>
                            <span>记住学号</span>
                        </label>
                        <button class="btn-primary" id="login-btn" style="width:100%">登录</button>
                        <div class="twofa-methods" id="twofa-methods">
                            <button class="btn-ghost" data-method="wechat">微信</button>
                            <button class="btn-ghost" data-method="mobile">短信</button>
                            <button class="btn-ghost" data-method="totp">TOTP</button>
                        </div>
                        <div class="twofa-code-row">
                            <input class="sb-input" id="twofa-code" placeholder="2FA 验证码" inputmode="numeric">
                            <button class="btn-ghost" id="twofa-submit">提交</button>
                        </div>
                    </div>
                </div>

                <!-- capabilities -->
                <div class="sb-section">
                    <div class="sb-section-title">能力</div>
                    <div class="cap-grid">
                        <button class="cap-card" data-prompt="今天下午有什么课">课表</button>
                        <button class="cap-card" data-prompt="查一下我的校园卡余额">校园卡</button>
                        <button class="cap-card" data-prompt="查一下研读间资源">研读间</button>
                        <button class="cap-card" data-prompt="明天羽毛球场有没有空位">体育</button>
                    </div>
                </div>

                <!-- quick tasks -->
                <div class="sb-section">
                    <div class="sb-section-title">快捷</div>
                    <div class="quick-list">
                        <button class="chip" data-prompt="你现在支持哪些真实动作？">真实动作</button>
                        <button class="chip" data-prompt="校园卡充 50 元">充 50</button>
                        <button class="chip" data-prompt="帮我预约明天 10:00-11:00 的研读间">预约研读间</button>
                        <button class="chip" data-prompt="打开明天羽毛球场预约页">体育预约</button>
                        <button class="chip" data-prompt="列出我当前待确认的动作">待确认</button>
                        <button class="chip" data-prompt="确认执行">确认执行</button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ═══ MAIN ═══ -->
        <main class="main">
            <header class="main-header">
                <div class="main-header-left">
                    <span class="main-title">Agent 工作台</span>
                    <span class="health-line" id="health-line">等待连接</span>
                </div>
                <div class="header-actions">
                    <button class="btn-ghost-light" id="clear-btn">清空</button>
                    <button class="btn-ghost-light" id="logout-btn">退出</button>
                </div>
            </header>

            <section class="messages" id="messages">
                <div class="message assistant">
                    <div class="message-inner">
                        <div class="avatar avatar-ai">AI</div>
                        <article class="assistant-card">
                            <div class="assistant-body">
                                <h2>你好 👋</h2>
                                <p>我是 Campus Agent，登录后输入任务即可。查询结果会整理成表格和动作卡片。</p>
                                <div class="kv-grid">
                                    <div class="kv-item">
                                        <span class="kv-key">💳 支付</span>
                                        <span class="kv-value">二维码确认</span>
                                    </div>
                                    <div class="kv-item">
                                        <span class="kv-key">📅 预约</span>
                                        <span class="kv-value">先查余量再执行</span>
                                    </div>
                                    <div class="kv-item">
                                        <span class="kv-key">🏸 体育</span>
                                        <span class="kv-value">实时场地状态</span>
                                    </div>
                                </div>
                            </div>
                        </article>
                    </div>
                </div>
            </section>

            <footer class="composer">
                <div class="composer-inner">
                    <textarea class="composer-input" id="chat-input" placeholder="输入校园任务…" rows="1"></textarea>
                    <button class="send-btn" id="send-btn" title="发送">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <!-- ═══ MODALS ═══ -->
    <div class="modal-overlay" id="pay-overlay">
        <div class="modal">
            <div class="modal-head">
                <h2>支付二维码</h2>
                <button class="btn-ghost-light" data-close-modal>关闭</button>
            </div>
            <div class="qr-box" id="pay-qr"></div>
            <p style="font-size:13px;color:var(--ink-secondary);text-align:center;">手机扫码完成支付，Web 端不会自动扣款。</p>
            <div class="url-box" id="pay-url"></div>
        </div>
    </div>

    <div class="modal-overlay" id="sports-overlay">
        <div class="modal large">
            <div class="modal-head">
                <div>
                    <h2>体育预约辅助面板</h2>
                    <div style="font-size:12px;color:var(--ink-secondary);margin-top:4px;" id="sports-status">获取截图后可在图上拖动滑块</div>
                </div>
                <button class="btn-ghost-light" data-close-modal>关闭</button>
            </div>
            <div class="captcha-stage" id="captcha-stage"></div>
            <div style="display:flex;gap:8px;margin-top:12px;">
                <button class="btn-secondary" id="refresh-captcha">刷新截图</button>
                <button class="btn-primary" id="submit-drag">提交轨迹</button>
                <button class="btn-ghost-light" id="clear-drag">清除</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- ═══ LOGIC ═══ -->
    <script>
        const state = {
            baseUrl: window.location.origin,
            busy: false,
            loginStatus: "unknown",
            pendingPayUrls: [],
            dragPoints: [],
            dragStartTime: 0,
        };

        const $ = (id) => document.getElementById(id);
        const savedUserId = window.localStorage.getItem("thu-ai-assistant:user-id");

        $("backend-url").value = state.baseUrl;
        if (savedUserId) {
            $("user-id").value = savedUserId;
            $("remember-user-id").checked = true;
            $("password").focus();
        }

        const prompts = document.querySelectorAll("[data-prompt]");
        prompts.forEach((node) => {
            node.addEventListener("click", () => sendQuick(node.dataset.prompt));
        });

        document.querySelectorAll("[data-close-modal]").forEach((node) => {
            node.addEventListener("click", () => node.closest(".modal-overlay").style.display = "none");
        });

        $("health-btn").addEventListener("click", checkHealth);
        $("login-btn").addEventListener("click", login);
        $("twofa-submit").addEventListener("click", submitTwoFactorCode);
        $("send-btn").addEventListener("click", () => sendMessage());
        $("clear-btn").addEventListener("click", clearChat);
        $("logout-btn").addEventListener("click", logout);
        $("refresh-captcha").addEventListener("click", loadCaptchaSnapshot);
        $("submit-drag").addEventListener("click", submitCaptchaDrag);
        $("clear-drag").addEventListener("click", () => {
            state.dragPoints = [];
            toast("已清除拖动轨迹");
        });

        document.querySelectorAll("#twofa-methods [data-method]").forEach((node) => {
            node.addEventListener("click", () => selectTwoFactorMethod(node.dataset.method));
        });

        $("chat-input").addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        ["user-id", "password"].forEach((id) => {
            $(id).addEventListener("keydown", (event) => {
                if (event.key === "Enter") {
                    event.preventDefault();
                    login();
                }
            });
        });

        $("chat-input").addEventListener("input", function () {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 140) + "px";
        });

        function apiBase() {
            return $("backend-url").value.replace(/\/+$/, "");
        }

        async function request(path, options = {}) {
            const response = await fetch(`${apiBase()}${path}`, {
                ...options,
                credentials: "include",
                headers: {
                    "Content-Type": "application/json",
                    ...(options.headers || {}),
                },
            });
            const body = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(body.error || body.message || `HTTP ${response.status}`);
            }
            return body;
        }

        function setBusy(value) {
            state.busy = value;
            ["health-btn", "login-btn", "send-btn", "twofa-submit"].forEach((id) => {
                $(id).disabled = value;
            });
        }

        function setStatus(status) {
            state.loginStatus = status || "unknown";
            const labels = {
                unknown: "未检查",
                not_logged_in: "未登录",
                pending: "登录中",
                two_factor: "二次验证",
                success: "已登录",
                error: "登录失败",
            };
            const pill = $("status-pill");
            pill.className = `status-pill status-${state.loginStatus}`;
            $("status-label").textContent = labels[state.loginStatus] || state.loginStatus;
        }

        function toast(text) {
            const node = $("toast");
            node.textContent = text;
            node.style.display = "block";
            setTimeout(() => {
                node.style.display = "none";
            }, 2400);
        }

        async function checkHealth() {
            setBusy(true);
            try {
                const [health, capabilities] = await Promise.all([
                    request("/api/health"),
                    request("/api/capabilities"),
                ]);
                $("health-line").textContent = `${health.service} · ${capabilities.count} 能力 · ${health.uptimeSeconds}s`;
                addSystem(`后端连接成功：${health.service}，已加载 ${capabilities.count} 个能力。`);
            } catch (error) {
                addSystem(`后端连接失败：${error.message}`);
            } finally {
                setBusy(false);
            }
        }

        async function login() {
            const userId = $("user-id").value.trim();
            const password = $("password").value;
            if (!userId || !password) {
                toast("请输入学号和密码");
                return;
            }
            setBusy(true);
            try {
                const body = await request("/api/login", {
                    method: "POST",
                    body: JSON.stringify({ userId, password }),
                });
                if ($("remember-user-id").checked) {
                    window.localStorage.setItem("thu-ai-assistant:user-id", userId);
                } else {
                    window.localStorage.removeItem("thu-ai-assistant:user-id");
                }
                setStatus(body.status);
                if (body.status === "success") {
                    addSystem("登录成功。");
                } else if (body.status === "two_factor") {
                    showTwoFactor(body.twoFactor);
                    addSystem("需要二次验证。");
                } else {
                    addSystem("登录已提交，等待后端完成。");
                    await pollLoginStatus();
                }
            } catch (error) {
                setStatus("error");
                addSystem(`登录失败：${error.message}`);
            } finally {
                setBusy(false);
            }
        }

        async function pollLoginStatus() {
            for (let i = 0; i < 40; i += 1) {
                await new Promise((resolve) => setTimeout(resolve, 1500));
                const body = await request("/api/login/status");
                setStatus(body.status);
                if (body.status === "success") {
                    addSystem("登录成功。");
                    return;
                }
                if (body.status === "two_factor") {
                    showTwoFactor(body.twoFactor);
                    addSystem("需要二次验证。");
                    return;
                }
                if (body.status === "error" || body.status === "not_logged_in") {
                    addSystem(body.error ? `登录失败：${body.error}` : `登录未完成：${body.status}`);
                    return;
                }
            }
            addSystem("登录仍在进行中，请稍后重试。");
        }

        function showTwoFactor(twoFactor) {
            const methods = $("twofa-methods");
            methods.style.display = twoFactor?.type === "method_selection" ? "grid" : "none";
            methods.querySelector('[data-method="wechat"]').style.display = twoFactor?.hasWeChatBool ? "block" : "none";
            methods.querySelector('[data-method="mobile"]').style.display = twoFactor?.phone ? "block" : "none";
            methods.querySelector('[data-method="totp"]').style.display = twoFactor?.hasTotp ? "block" : "none";
        }

        async function selectTwoFactorMethod(method) {
            setBusy(true);
            try {
                await request("/api/login/2fa/method", {
                    method: "POST",
                    body: JSON.stringify({ method }),
                });
                addSystem(`已选择 ${method} 验证方式，请输入验证码。`);
                await pollLoginStatus();
            } catch (error) {
                addSystem(`选择验证方式失败：${error.message}`);
            } finally {
                setBusy(false);
            }
        }

        async function submitTwoFactorCode() {
            const code = $("twofa-code").value.trim();
            if (!code) return;
            setBusy(true);
            try {
                await request("/api/login/2fa/code", {
                    method: "POST",
                    body: JSON.stringify({ code }),
                });
                addSystem("验证码已提交，等待后端完成登录。");
                await pollLoginStatus();
            } catch (error) {
                addSystem(`提交验证码失败：${error.message}`);
            } finally {
                setBusy(false);
            }
        }

        async function sendQuick(prompt) {
            $("chat-input").value = prompt;
            await sendMessage(prompt);
        }

        async function sendMessage(forcedText) {
            const input = $("chat-input");
            const message = (forcedText || input.value).trim();
            if (!message || state.busy) return;
            input.value = "";
            input.style.height = "auto";
            addMessage(message, "user");
            setBusy(true);
            const typing = addTyping();
            try {
                const body = await request("/api/chat", {
                    method: "POST",
                    body: JSON.stringify({ message }),
                });
                typing.remove();
                addMessage(body.reply || "后端没有返回回复。", "assistant", {
                    actions: body.actions,
                    toolResults: body.toolResults,
                    actionResult: body.actionResult,
                });
            } catch (error) {
                typing.remove();
                if (String(error.message).includes("请先登录")) setStatus("not_logged_in");
                addMessage(`### 调用失败\n${error.message}`, "assistant");
            } finally {
                setBusy(false);
                input.focus();
            }
        }

        function addSystem(text) {
            const wrapper = document.createElement("div");
            wrapper.className = "system-event";
            wrapper.textContent = text;
            $("messages").appendChild(wrapper);
            scrollToBottom();
        }

        function addTyping() {
            const wrapper = document.createElement("div");
            wrapper.className = "message assistant";
            wrapper.innerHTML = `<div class="message-inner"><div class="avatar avatar-ai">AI</div><article class="assistant-card"><div class="typing"><span></span><span></span><span></span></div></article></div>`;
            $("messages").appendChild(wrapper);
            scrollToBottom();
            return wrapper;
        }

        function addMessage(content, role, details = {}) {
            const wrapper = document.createElement("div");
            wrapper.className = `message ${role}`;

            const inner = document.createElement("div");
            inner.className = "message-inner";

            if (role === "user") {
                const bubble = document.createElement("div");
                bubble.className = "user-bubble";
                bubble.textContent = content;
                inner.appendChild(bubble);
            } else {
                const avatar = document.createElement("div");
                avatar.className = "avatar avatar-ai";
                avatar.textContent = "AI";
                inner.appendChild(avatar);

                const card = document.createElement("article");
                card.className = "assistant-card";
                const parsed = parseActionMarkers(content);
                const body = document.createElement("div");
                body.className = "assistant-body";
                body.innerHTML = renderMarkdown(parsed.cleanText);
                card.appendChild(body);
                renderActionCards(card, parsed, details);
                renderToolResults(card, details);
                if (parsed.hasSportsCaptcha) {
                    setTimeout(() => openSportsPanel(), 0);
                }
                inner.appendChild(card);
            }

            wrapper.appendChild(inner);
            $("messages").appendChild(wrapper);
            scrollToBottom();
        }

        function parseActionMarkers(content) {
            const payUrls = [];
            const openUrls = [];
            let cleanText = content
                .replace(/\[PAY_QR:([^\]]+)\]/g, (_, url) => {
                    payUrls.push(url);
                    return "";
                })
                .replace(/\[OPEN_URL:([^\]]+)\]/g, (_, url) => {
                    openUrls.push(url);
                    return "";
                });
            const hasSportsCaptcha = cleanText.includes("[SPORTS_CAPTCHA:current]");
            cleanText = cleanText.replace(/\[SPORTS_CAPTCHA:current\]/g, "");
            return { cleanText: cleanText.trim(), payUrls, openUrls, hasSportsCaptcha };
        }

        function collectStructuredActions(parsed, details) {
            const actions = [];
            const push = (action) => {
                if (!action || !action.type) return;
                const key = JSON.stringify(action);
                if (actions.some((item) => JSON.stringify(item) === key)) return;
                actions.push(action);
            };

            (Array.isArray(details.actions) ? details.actions : []).forEach(push);
            if (Array.isArray(details.actionResult?.actions)) {
                details.actionResult.actions.forEach(push);
            }
            parsed.payUrls.forEach((url) => push({ type: "payment_qr", label: "支付二维码", url }));
            parsed.openUrls.forEach((url) => push({ type: "open_url", label: "打开页面", url }));
            if (parsed.hasSportsCaptcha) {
                push({ type: "sports_captcha", label: "体育验证码辅助面板", panel: "current" });
            }
            return actions;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function asDisplayValue(value) {
            if (value === undefined || value === null || value === "") return "无";
            if (Array.isArray(value)) return `${value.length} 项`;
            if (typeof value === "object") return Object.keys(value).length ? `${Object.keys(value).length} 个字段` : "空对象";
            return String(value);
        }

        function collectToolFields(result) {
            const fields = [];
            const push = (key, value) => {
                if (fields.length >= 8) return;
                fields.push([key, asDisplayValue(value)]);
            };
            if (result.error) push("error", result.error);
            if (result.message) push("message", result.message);
            const data = result.data;
            if (Array.isArray(data)) {
                push("data", `${data.length} 项`);
                const first = data.find((item) => item && typeof item === "object");
                if (first) {
                    Object.entries(first).slice(0, 5).forEach(([key, value]) => push(key, value));
                }
            } else if (data && typeof data === "object") {
                Object.entries(data).slice(0, 7).forEach(([key, value]) => push(key, value));
            } else if (data !== undefined && data !== null) {
                push("data", data);
            }
            if (result.meta && typeof result.meta === "object") {
                Object.entries(result.meta).slice(0, 4).forEach(([key, value]) => push(`meta.${key}`, value));
            }
            return fields;
        }

        function renderToolResults(card, details) {
            const items = Array.isArray(details.toolResults) ? [...details.toolResults] : [];
            if (details.actionResult) {
                items.push({
                    name: "confirm_pending_action",
                    args: {},
                    result: details.actionResult,
                });
            }
            if (!items.length) return;

            const section = document.createElement("div");
            section.className = "tool-results";

            items.slice(0, 4).forEach((item) => {
                const result = item.result || {};
                const fields = collectToolFields(result);
                const node = document.createElement("div");
                node.className = "tool-result";
                const statusClass = result.success === false ? " failed" : "";
                node.innerHTML = `
                    <div class="tool-result-head">
                        <span class="tool-name">${escapeHtml(item.name || "tool")}</span>
                        <span class="tool-status${statusClass}">${escapeHtml(result.status || (result.success === false ? "error" : "ok"))}</span>
                    </div>
                    <div class="tool-fields">
                        ${fields.map(([key, value]) => `
                            <div class="tool-field">
                                <span class="tool-field-key">${escapeHtml(key)}</span>
                                <span class="tool-field-value">${escapeHtml(value)}</span>
                            </div>
                        `).join("")}
                    </div>
                `;
                section.appendChild(node);
            });

            card.appendChild(section);
        }

        function tryRenderJsonSummary(text) {
            const trimmed = text.trim();
            if (!trimmed || !/^[\[{]/.test(trimmed)) return "";
            try {
                const data = JSON.parse(trimmed);
                const rows = [];
                const pushRow = (key, value) => {
                    if (value === undefined || value === null || typeof value === "object") return;
                    rows.push(`<div class="kv-item"><span class="kv-key">${escapeHtml(key)}</span><span class="kv-value">${escapeHtml(String(value))}</span></div>`);
                };
                const source = Array.isArray(data) ? data[0] : data;
                if (!source || typeof source !== "object") return "";
                Object.entries(source).slice(0, 8).forEach(([key, value]) => pushRow(key, value));
                if (!rows.length) return "";
                return `<div class="kv-grid">${rows.join("")}</div><pre><code>${escapeHtml(JSON.stringify(data, null, 2))}</code></pre>`;
            } catch {
                return "";
            }
        }

        function isTableDivider(line) {
            return /^\s*\|?[\s:-]+\|[\s|:-]*$/.test(line);
        }

        function renderTable(lines, startIndex) {
            const tableLines = [];
            let index = startIndex;
            while (index < lines.length && lines[index].includes("|") && lines[index].trim()) {
                tableLines.push(lines[index]);
                index += 1;
            }
            if (tableLines.length < 2 || !isTableDivider(tableLines[1])) {
                return null;
            }
            const parseCells = (line) => line
                .trim()
                .replace(/^\|/, "")
                .replace(/\|$/, "")
                .split("|")
                .map((cell) => cell.trim());
            const header = parseCells(tableLines[0]);
            const bodyLines = tableLines.slice(2);
            const thead = `<thead><tr>${header.map((cell) => `<th>${renderInline(escapeHtml(cell))}</th>`).join("")}</tr></thead>`;
            const tbody = `<tbody>${bodyLines.map((line) => {
                const cells = parseCells(line);
                return `<tr>${cells.map((cell) => `<td>${renderInline(escapeHtml(cell))}</td>`).join("")}</tr>`;
            }).join("")}</tbody>`;
            return { html: `<table>${thead}${tbody}</table>`, nextIndex: index };
        }

        function renderMarkdown(text) {
            if (!text) return '<p class="render-empty">没有返回可展示内容。</p>';
            const jsonSummary = tryRenderJsonSummary(text);
            if (jsonSummary) return jsonSummary;
            const lines = text.split(/\r?\n/);
            const blocks = [];
            let list = null;
            let code = null;
            const flushList = () => {
                if (list) {
                    blocks.push(`${list.type === "ol" ? "<ol>" : "<ul>"}${list.items.join("")}${list.type === "ol" ? "</ol>" : "</ul>"}`);
                    list = null;
                }
            };
            const flushCode = () => {
                if (code) {
                    blocks.push(`<pre><code>${escapeHtml(code.lines.join("\n"))}</code></pre>`);
                    code = null;
                }
            };
            for (let i = 0; i < lines.length; i += 1) {
                const raw = lines[i];
                const line = raw.trim();
                const fence = /^```/.exec(line);
                if (fence) {
                    if (code) {
                        flushCode();
                    } else {
                        flushList();
                        code = { lines: [] };
                    }
                    continue;
                }
                if (code) {
                    code.lines.push(raw);
                    continue;
                }
                if (!line) {
                    flushList();
                    continue;
                }
                const heading = /^(#{1,4})\s+(.+)/.exec(line);
                if (heading) {
                    flushList();
                    const level = heading[1].length;
                    blocks.push(`<h${level + 1}>${renderInline(escapeHtml(heading[2]))}</h${level + 1}>`);
                    continue;
                }
                const bq = /^>\s*(.*)/.exec(line);
                if (bq) {
                    flushList();
                    blocks.push(`<blockquote>${renderInline(escapeHtml(bq[1]))}</blockquote>`);
                    continue;
                }
                if (line.includes("|") && i + 1 < lines.length && isTableDivider(lines[i + 1])) {
                    flushList();
                    const table = renderTable(lines, i);
                    if (table) {
                        blocks.push(table.html);
                        i = table.nextIndex - 1;
                        continue;
                    }
                }
                const ul = /^[-*]\s+(.+)/.exec(line);
                if (ul) {
                    if (!list || list.type !== "ul") {
                        flushList();
                        list = { type: "ul", items: [] };
                    }
                    list.items.push(`<li>${renderInline(escapeHtml(ul[1]))}</li>`);
                    continue;
                }
                const ol = /^(\d+)[.)]\s+(.+)/.exec(line);
                if (ol) {
                    if (!list || list.type !== "ol") {
                        flushList();
                        list = { type: "ol", items: [] };
                    }
                    list.items.push(`<li>${renderInline(escapeHtml(ol[2]))}</li>`);
                    continue;
                }
                flushList();
                blocks.push(`<p>${renderInline(escapeHtml(line))}</p>`);
            }
            flushList();
            flushCode();
            return blocks.join("");
        }

        function renderInline(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                .replace(/`(.+?)`/g, "<code>$1</code>")
                .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
        }

        function renderActionCards(card, parsed, details) {
            const actions = collectStructuredActions(parsed, details);
            if (!actions.length) return;
            const row = document.createElement("div");
            row.className = "action-row";

            actions.filter((action) => action.type === "payment_qr" && action.url).forEach((action) => {
                const item = document.createElement("div");
                item.className = "action-card";
                item.innerHTML = `<strong>支付订单</strong><p>弹出二维码，手机扫码完成支付。</p>`;
                const button = document.createElement("button");
                button.className = "btn-primary";
                button.textContent = "查看二维码";
                button.addEventListener("click", () => openPayModal(action.url));
                item.appendChild(button);
                row.appendChild(item);
            });

            actions.filter((action) => action.type === "open_url" && action.url).forEach((action) => {
                const item = document.createElement("div");
                item.className = "action-card";
                item.innerHTML = `<strong>预约跳转</strong><p>打开真实预约页面完成操作。</p>`;
                const button = document.createElement("button");
                button.className = "btn-secondary";
                button.textContent = "打开页面";
                button.addEventListener("click", () => window.open(action.url, "_blank", "noopener,noreferrer"));
                item.appendChild(button);
                row.appendChild(item);
            });

            if (actions.some((action) => action.type === "sports_captcha")) {
                const item = document.createElement("div");
                item.className = "action-card";
                item.innerHTML = `<strong>体育验证码</strong><p>拉取截图，手动拖动轨迹后回放。</p>`;
                const button = document.createElement("button");
                button.className = "btn-primary";
                button.textContent = "打开面板";
                button.addEventListener("click", () => openSportsPanel());
                item.appendChild(button);
                row.appendChild(item);
            }

            card.appendChild(row);
        }

        function openPayModal(url) {
            $("pay-url").textContent = url;
            const container = $("pay-qr");
            container.innerHTML = "";
            generateQr(container, url, 280);
            $("pay-overlay").style.display = "flex";
        }

        function generateQr(container, url, size) {
            if (window.QRCode?.toCanvas) {
                const canvas = document.createElement("canvas");
                QRCode.toCanvas(canvas, url, {
                    width: size,
                    margin: 2,
                    color: { dark: "#000000", light: "#ffffff" },
                }, (error) => {
                    if (error) fallbackQr(container, url, size);
                });
                container.appendChild(canvas);
                return;
            }
            fallbackQr(container, url, size);
        }

        function fallbackQr(container, url, size) {
            const img = document.createElement("img");
            img.alt = "支付二维码";
            img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(url)}`;
            container.appendChild(img);
        }

        async function openSportsPanel() {
            $("sports-overlay").style.display = "flex";
            await loadCaptchaSnapshot();
        }

        async function loadCaptchaSnapshot() {
            $("sports-status").textContent = "正在获取截图...";
            const stage = $("captcha-stage");
            stage.innerHTML = "";
            state.dragPoints = [];
            try {
                const body = await request("/api/sports/captcha/screenshot");
                if (!body.success || !body.imageDataUrl) {
                    throw new Error(body.message || body.error || "没有可用截图");
                }
                const img = document.createElement("img");
                img.src = body.imageDataUrl;
                img.alt = "体育预约页面截图";
                attachDragHandlers(img);
                stage.appendChild(img);
                $("sports-status").textContent = body.currentUrl ? `当前页面：${body.currentUrl}` : "截图已加载";
            } catch (error) {
                stage.innerHTML = `<p style="color:#999;padding:24px;">${escapeHtml(error.message)}</p>`;
                $("sports-status").textContent = "获取截图失败";
            }
        }

        function attachDragHandlers(img) {
            let dragging = false;
            const addPoint = (event) => {
                const rect = img.getBoundingClientRect();
                const scaleX = img.naturalWidth / rect.width;
                const scaleY = img.naturalHeight / rect.height;
                state.dragPoints.push({
                    x: Math.round((event.clientX - rect.left) * scaleX),
                    y: Math.round((event.clientY - rect.top) * scaleY),
                    t: Date.now() - state.dragStartTime,
                });
            };
            img.addEventListener("pointerdown", (event) => {
                dragging = true;
                state.dragPoints = [];
                state.dragStartTime = Date.now();
                img.setPointerCapture(event.pointerId);
                addPoint(event);
            });
            img.addEventListener("pointermove", (event) => {
                if (dragging) addPoint(event);
            });
            img.addEventListener("pointerup", (event) => {
                if (dragging) {
                    addPoint(event);
                    dragging = false;
                    $("sports-status").textContent = `已记录 ${state.dragPoints.length} 个拖动点`;
                }
            });
        }

        async function submitCaptchaDrag() {
            if (!state.dragPoints.length) {
                toast("请先在截图上拖动滑块轨迹");
                return;
            }
            $("sports-status").textContent = "正在回放拖动轨迹...";
            try {
                const body = await request("/api/sports/captcha/drag", {
                    method: "POST",
                    body: JSON.stringify({ points: state.dragPoints }),
                });
                $("sports-status").textContent = body.message || "拖动轨迹已提交";
                toast(body.success ? "轨迹提交成功" : "轨迹提交失败");
            } catch (error) {
                $("sports-status").textContent = `提交失败：${error.message}`;
            }
        }

        async function clearChat() {
            await request("/api/chat/clear", { method: "POST" }).catch(() => {});
            $("messages").innerHTML = "";
            addMessage("Campus Agent 已就绪。输入任务开始。", "assistant");
        }

        async function logout() {
            await request("/api/logout", { method: "POST" }).catch(() => {});
            setStatus("not_logged_in");
            addSystem("已退出登录。");
        }

        function scrollToBottom() {
            const messages = $("messages");
            messages.scrollTop = messages.scrollHeight;
        }

        (async function init() {
            try {
                const body = await request("/api/login/status");
                setStatus(body.status);
                await checkHealth();
            } catch {
                setStatus("unknown");
            }
        })();
    </script>
</body>
